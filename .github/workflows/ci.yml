name: Python Full Lifecycle Pipeline

on:
  push:
    branches: [ "main", "git_action_br" ] # Triggers on both branches
  pull_request:
    branches: [ "main" ]

jobs:
  # --- STAGE 1: Quality Control (CI) ---
  lint-and-test:
    name: Build & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Keep running other versions even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Code
        run: |
          # Fails if there are logic/syntax errors (E9, F63, F7, F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Unit Tests
        run: pytest

  # --- STAGE 2: Deployment (CD) ---
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    needs: lint-and-test # Only runs if ALL matrix tests pass
    # Guardrail: Only deploy if the push is to the main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Deployment
        run: |
          echo "🚀 Deploying to Production Server..."
          echo "Environment: Production"
          echo "Artifact: version-${{ github.sha }}"
          # In a real scenario, you would add your Docker or Cloud commands here