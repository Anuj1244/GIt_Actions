name: Python CD - Docker Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # This is our previous CI job
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Tests
        run: |
          pip install pytest
          pytest

  # This is the CD Job
  deploy:
    runs-on: ubuntu-latest
    needs: test  # CRITICAL: This job won't start if 'test' fails
    if: github.ref == 'refs/heads/main' # Only deploy from the main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: user/python-app:latest